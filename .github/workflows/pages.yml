name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Resolve static output
        id: output
        shell: bash
        run: |
          if [ -f "dist/index.html" ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
          elif [ -f ".output/public/index.html" ]; then
            echo "path=.output/public" >> "$GITHUB_OUTPUT"
          elif [ -f "build/client/index.html" ]; then
            echo "path=build/client" >> "$GITHUB_OUTPUT"
          else
            echo "No static index.html found after build."
            find . -maxdepth 3 -name index.html -print
            exit 1
          fi

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          OUT="${{ steps.output.outputs.path }}"
          touch "$OUT/.nojekyll"
          cp "$OUT/index.html" "$OUT/404.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.output.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
